[build]
  publish = "."

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/directorio"
  to   = "/directorio.html"
  status = 200

[[redirects]]
  from = "/hostal/*"
  to   = "/:splat.html"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404
